root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/ws ."
  entrypoint = "./tmp/ws"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor"]
  include_dir = ["."]
  exclude_regex = ["_test.go"]
  delay = 1000
  stop_on_error = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[log]
  time = false
