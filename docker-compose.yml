services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sevens
      POSTGRES_PASSWORD: sevens
      POSTGRES_DB: sevens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sevens"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Dedicated Redis for the WS cross-replica relay (pub/sub, owner leases, room
  # snapshots). Kept separate from the shared `redis` (OAuth state + presence) so
  # game relay traffic doesn't contend with it. The WS service falls back to
  # REDIS_URL when WS_REDIS_URL is unset, so this is only required for the
  # multi-replica path.
  redis-ws:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional local SMTP inbox for testing password-reset / email-verification
  # mail (#42). Uncomment this service AND the SMTP_* env on `api` below to send
  # real mail to a local inbox at http://localhost:8025. Left off by default —
  # without SMTP_HOST the API uses a dev log sender that prints links to stdout.
  # mailpit:
  #   image: axllent/mailpit:latest
  #   ports:
  #     - "8025:8025"   # web UI
  #     - "1025:1025"   # SMTP
  #   healthcheck:
  #     test: ["CMD", "wget", "-qO-", "http://localhost:8025"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  api:
    build:
      context: ./services/api
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://sevens:sevens@postgres:5432/sevens?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      INTERNAL_API_SECRET: change-me-internal-secret
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      # Email (#42): leave SMTP_HOST unset to log reset/verify links to the API
      # console (dev default). To send to the local Mailpit inbox, uncomment the
      # mailpit service above and these vars:
      # SMTP_HOST: mailpit
      # SMTP_PORT: "1025"
      # SMTP_FROM: no-reply@sevenspade.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ws:
    build:
      context: ./services/ws
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: postgres://sevens:sevens@postgres:5432/sevens?sslmode=disable
      REDIS_URL: redis://redis:6379
      WS_REDIS_URL: redis://redis-ws:6379
      JWT_SECRET: change-me-in-production
      API_URL: http://api:8080
      INTERNAL_API_SECRET: change-me-internal-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-ws:
        condition: service_healthy

  # Multi-replica WS for exercising the cross-replica relay locally. It shares
  # the same image/env as `ws` but publishes no fixed host port (Compose can't
  # bind one host port to multiple replicas), so reach it only through the `web`
  # nginx proxy or by `docker compose up --scale ws-replica=N`. The single `ws`
  # above remains the default-port entry for direct local testing.
  ws-replica:
    build:
      context: ./services/ws
    environment:
      PORT: "8081"
      DATABASE_URL: postgres://sevens:sevens@postgres:5432/sevens?sslmode=disable
      REDIS_URL: redis://redis:6379
      WS_REDIS_URL: redis://redis-ws:6379
      JWT_SECRET: change-me-in-production
      API_URL: http://api:8080
      INTERNAL_API_SECRET: change-me-internal-secret
    deploy:
      replicas: 0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-ws:
        condition: service_healthy

  web:
    build:
      context: ./web
    ports:
      - "3000:80"
    depends_on:
      - api
      - ws

volumes:
  postgres_data:
