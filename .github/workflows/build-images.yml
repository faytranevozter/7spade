name: Build images

# Builds and publishes the three service images (api, ws, web) to the GitHub
# Container Registry (ghcr.io). Runs on pushes to main that touch a service,
# on version tags, and on manual dispatch. Pull requests build only (no push)
# to validate the Dockerfiles.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'services/api/**'
      - 'services/ws/**'
      - 'web/**'
      - '.github/workflows/build-images.yml'
  pull_request:
    paths:
      - 'services/api/**'
      - 'services/ws/**'
      - 'web/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: ./services/api
          - service: ws
            context: ./services/ws
          - service: web
            context: ./web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # On version tags, require git tag vX.Y.Z to match the VERSION file so
      # releases stay in sync with scripts/bump-semver.sh (vibecode-aio style).
      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          raw="${GITHUB_REF_NAME}"
          version="${raw#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$'; then
            echo "error: tag must be vX.Y.Z (got ${raw})" >&2
            exit 1
          fi
          file_version="$(tr -d '[:space:]' < VERSION)"
          if [ "$version" != "$file_version" ]; then
            echo "error: git tag v${version} does not match VERSION file (${file_version})" >&2
            echo "Run: make bump-patch|bump-minor|bump-major, commit, then tag v\$(cat VERSION)." >&2
            exit 1
          fi
          echo "VERSION=${file_version} matches tag ${raw}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only log in / push for repo-internal events (pushes, tags, dispatch).
      # Forked-PR builds lack package-write permission, so they build only.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image name (lowercased owner/repo)
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}/${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # The web image bakes VITE_* into the static bundle at build time.
          # Provide production URLs via repository variables (Settings → Variables)
          # so the published image points at the real API/WS hosts. When unset,
          # the bundle falls back to the localhost defaults in web/src.
          build-args: |
            ${{ matrix.service == 'web' && format('VITE_API_URL={0}', vars.VITE_API_URL) || '' }}
            ${{ matrix.service == 'web' && format('VITE_WS_URL={0}', vars.VITE_WS_URL) || '' }}
            ${{ matrix.service == 'web' && format('VITE_WS_HEALTH_URL={0}', vars.VITE_WS_HEALTH_URL) || '' }}
